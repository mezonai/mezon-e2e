name: 'Allure Daily Report - Deploy to Vercel'

on:
  # 19:00 UTC = 02:00 AM next day Vietnam time (UTC+7)
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  allure-daily:
    runs-on: mezon-e2e

    # Job-level timeout: never let a hung step block the runner for hours
    timeout-minutes: 360

    env:
      ALLURE_VERCEL_ROOT: /home/nccsoft/allure-vercel-reports
      # Fixed browser path pre-installed on the VPS (one-time setup).
      # Playwright skips the download when the matching version already exists here.
      PLAYWRIGHT_BROWSERS_PATH: /home/member/pw-browsers

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # chromedriver 149 requires Node.js 22 or newer. Do not rely on the
      # system-wide Node.js version installed on the self-hosted runner.
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      # -----------------------------------------------------------------------
      # 2. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        timeout-minutes: 10
        run: yarn install

      # -----------------------------------------------------------------------
      # 3. Install Playwright browsers
      #    Near-instant no-op when the pinned version already exists in
      #    PLAYWRIGHT_BROWSERS_PATH; only downloads after a Playwright upgrade.
      # -----------------------------------------------------------------------
      - name: Install Playwright browsers
        timeout-minutes: 10
        env:
          PLAYWRIGHT_HOST_PLATFORM_OVERRIDE: ubuntu24.04-x64
        run: npx playwright install chromium

      # -----------------------------------------------------------------------
      # 4. Connect VPN — required to access dev-mezon.nccsoft.vn
      #    timeout-minutes guards against any hang (e.g. sudo password prompt).
      #    Requires NOPASSWD sudo rules on the VPS (see /etc/sudoers.d/gha-vpn).
      # -----------------------------------------------------------------------
      - name: Connect VPN
        timeout-minutes: 3
        env:
          VPN_OVPN_CONFIG: ${{ secrets.VPN_OVPN_CONFIG }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          # Fail fast if sudo would prompt for a password (that hang is invisible in CI)
          if ! sudo -n true 2>/dev/null; then
            echo "::error::sudo requires a password on this runner — add NOPASSWD rules (/etc/sudoers.d/gha-vpn)"
            exit 1
          fi

          echo "$VPN_OVPN_CONFIG" > /tmp/vpn-config.ovpn
          chmod 600 /tmp/vpn-config.ovpn

          printf '%s\n%s\n' "$VPN_USERNAME" "$VPN_PASSWORD" > /tmp/vpn-creds.txt
          chmod 600 /tmp/vpn-creds.txt

          # Recreate log/pid as root first (fs.protected_regular=2 workaround),
          # then chmod 666 so the non-root runner user can read them.
          sudo rm -f /tmp/openvpn.log /tmp/openvpn.pid
          sudo touch /tmp/openvpn.log /tmp/openvpn.pid
          sudo chmod 666 /tmp/openvpn.log /tmp/openvpn.pid

          # /dev/null redirects are required: without them the forked daemon
          # inherits this step's stdout pipe and the step never terminates.
          sudo openvpn --config /tmp/vpn-config.ovpn \
            --auth-user-pass /tmp/vpn-creds.txt \
            --daemon \
            --pull-filter ignore "redirect-gateway" \
            --route 172.16.100.0 255.255.255.0 \
            --log /tmp/openvpn.log \
            --writepid /tmp/openvpn.pid \
            < /dev/null > /dev/null 2>&1

          for i in $(seq 1 30); do
            if grep -q "Initialization Sequence Completed" /tmp/openvpn.log 2>/dev/null; then
              echo "VPN ready after ${i}s"
              rm -f /tmp/vpn-creds.txt
              exit 0
            fi
            sleep 1
          done

          echo "VPN did not initialize within 30s — log:"
          cat /tmp/openvpn.log
          rm -f /tmp/vpn-creds.txt
          exit 1

      # -----------------------------------------------------------------------
      # 5. Create .env file
      # -----------------------------------------------------------------------
      - name: Create environment file
        run: |
          cat > .env << 'EOF'
          BASE_URL=https://dev-mezon.nccsoft.vn/
          WORKERS=1
          CI=true
          MEZON_NOTIFICATIONS=false
          TEST_GAP_MS=10000
          EOF
          sed -i 's/^[[:space:]]*//' .env
          echo "--- .env contents ---" && cat .env

      # -----------------------------------------------------------------------
      # 6. Run Playwright tests
      #    continue-on-error: true — test failures must NOT block report generation
      # -----------------------------------------------------------------------
      - name: Clean previous test artifacts
        run: npm run clean

      - name: Run Playwright tests
        id: run-tests
        timeout-minutes: 360
        run: |
          xvfb-run npx playwright test --project Chrome
        continue-on-error: true

      # -----------------------------------------------------------------------
      # 7. Generate Allure report and deploy to Vercel
      # -----------------------------------------------------------------------
      - name: Generate Allure report and deploy to Vercel
        if: always()
        timeout-minutes: 10
        env:
          ALLURE_VERCEL_ROOT: ${{ env.ALLURE_VERCEL_ROOT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/allure/allure-daily.sh

      # -----------------------------------------------------------------------
      # 8. Disconnect VPN — cleanup, always runs
      # -----------------------------------------------------------------------
      - name: Disconnect VPN
        if: always()
        timeout-minutes: 2
        run: |
          if [ -f /tmp/openvpn.pid ]; then
            sudo -n kill "$(cat /tmp/openvpn.pid)" 2>/dev/null || true
            sudo -n rm -f /tmp/openvpn.pid /tmp/openvpn.log /tmp/vpn-config.ovpn /tmp/vpn-creds.txt || true
            echo "VPN disconnected and config removed"
          else
            echo "No VPN PID file found, skipping disconnect"
          fi

      # -----------------------------------------------------------------------
      # 9. Upload allure-results as artifact for debugging if deploy fails
      # -----------------------------------------------------------------------
      - name: Upload allure-results artifact (debug fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 3
          if-no-files-found: ignore
