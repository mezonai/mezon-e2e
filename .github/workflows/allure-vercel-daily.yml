name: 'Allure Daily Report - Deploy to Vercel'

on:
  # 19:00 UTC = 02:00 AM next day Vietnam time (UTC+7)
  schedule:
    - cron: '0 19 * * *'
  # Allow manual trigger for testing before trusting the cron schedule
  workflow_dispatch: {}

jobs:
  allure-daily:
    runs-on: mezon-e2e

    env:
      ALLURE_VERCEL_ROOT: /home/nccsoft/allure-vercel-reports

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Disable cache: 'yarn' because it causes a file-not-found error on the self-hosted runner

      # -----------------------------------------------------------------------
      # 2b. Enable Yarn via Corepack (yarn is not pre-installed on the self-hosted runner)
      # -----------------------------------------------------------------------
      - name: Enable Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate
          yarn --version

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: yarn install

      # -----------------------------------------------------------------------
      # 3. Install Playwright browsers
      # -----------------------------------------------------------------------
      - name: Install Playwright browsers
        env:
          PLAYWRIGHT_HOST_PLATFORM_OVERRIDE: ubuntu24.04-x64
        run: npx playwright install chromium

      # -----------------------------------------------------------------------
      # 4. Check Java runtime (required by allure-commandline)
      #    continue-on-error is intentionally false — missing Java will cause
      #    the report generation step to fail anyway, so fail fast here.
      # -----------------------------------------------------------------------
      - name: Check Java runtime
        run: |
          command -v java || (
            echo "Java not found, installing..."
            sudo apt-get update -qq
            sudo apt-get install -y default-jre
          )
          java -version

      # -----------------------------------------------------------------------
      # 5. Connect VPN — required to access dev-mezon.nccsoft.vn (internal network)
      #    Only routes the 172.16.100.0/24 subnet, does NOT touch the default route
      #    → no impact on mezonly.com or any other traffic on the server
      #
      #    NOTE: log/pid files are created with `sudo touch` (not plain touch).
      #    Ubuntu's kernel hardening (fs.protected_regular=2) blocks root from
      #    opening a write to a file inside a sticky world-writable dir (/tmp)
      #    when the file's owner doesn't match root — even with chmod 666.
      #    Creating the file as root first avoids this EACCES error.
      # -----------------------------------------------------------------------
      - name: Connect VPN
        env:
          VPN_OVPN_CONFIG: ${{ secrets.VPN_OVPN_CONFIG }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          echo "$VPN_OVPN_CONFIG" > /tmp/vpn-config.ovpn
          chmod 600 /tmp/vpn-config.ovpn

          printf '%s\n%s\n' "$VPN_USERNAME" "$VPN_PASSWORD" > /tmp/vpn-creds.txt
          chmod 600 /tmp/vpn-creds.txt

          # Remove leftover files from a previous run (owned by root) so we can
          # recreate them owned by root again. chmod 666 afterwards lets the
          # runner user (non-root) read the files for grep/cat below and in
          # the Disconnect VPN step.
          sudo rm -f /tmp/openvpn.log /tmp/openvpn.pid
          sudo touch /tmp/openvpn.log /tmp/openvpn.pid
          sudo chmod 666 /tmp/openvpn.log /tmp/openvpn.pid

          sudo openvpn --config /tmp/vpn-config.ovpn \
            --auth-user-pass /tmp/vpn-creds.txt \
            --daemon \
            --pull-filter ignore "redirect-gateway" \
            --route 172.16.100.0 255.255.255.0 \
            --log /tmp/openvpn.log \
            --writepid /tmp/openvpn.pid

          for i in $(seq 1 30); do
            if grep -q "Initialization Sequence Completed" /tmp/openvpn.log 2>/dev/null; then
              echo "VPN ready after ${i}s"
              rm -f /tmp/vpn-creds.txt
              exit 0
            fi
            sleep 1
          done

          echo "VPN did not initialize within 30s — log:"
          cat /tmp/openvpn.log
          rm -f /tmp/vpn-creds.txt
          exit 1

      # -----------------------------------------------------------------------
      # 6. Create .env file
      # -----------------------------------------------------------------------
      - name: Create environment file
        run: |
          cat > .env << EOF
          BASE_URL=https://dev-mezon.nccsoft.vn
          WORKERS=12
          CI=true
          EOF

      # -----------------------------------------------------------------------
      # 7. Run Playwright tests
      #    continue-on-error: true — test failures must NOT block report generation
      # -----------------------------------------------------------------------
      - name: Run Playwright tests
        id: run-tests
        run: xvfb-run yarn test
        continue-on-error: true

      # -----------------------------------------------------------------------
      # 8. Generate Allure report and deploy to Vercel
      #    if: always() — runs even when the test step above fails
      # -----------------------------------------------------------------------
      - name: Generate Allure report and deploy to Vercel
        if: always()
        env:
          ALLURE_VERCEL_ROOT: ${{ env.ALLURE_VERCEL_ROOT }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          bash scripts/allure/allure-daily.sh

      # -----------------------------------------------------------------------
      # 9. Disconnect VPN — cleanup, always runs (even when tests or deploy fail)
      #    IMPORTANT: this step must not be removed; otherwise the VPN process will
      #    remain running on the server after the job ends.
      # -----------------------------------------------------------------------
      - name: Disconnect VPN
        if: always()
        run: |
          if [ -f /tmp/openvpn.pid ]; then
            sudo kill "$(cat /tmp/openvpn.pid)" 2>/dev/null || true
            sudo rm -f /tmp/openvpn.pid /tmp/openvpn.log /tmp/vpn-config.ovpn /tmp/vpn-creds.txt
            echo "VPN disconnected and config removed"
          else
            echo "No VPN PID file found, skipping disconnect"
          fi

      # -----------------------------------------------------------------------
      # 10. Upload allure-results as artifact for debugging if deploy fails
      #    if-no-files-found: ignore — the folder may already be deleted by
      #    allure-daily.sh if everything succeeded
      # -----------------------------------------------------------------------
      - name: Upload allure-results artifact (debug fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 3
          if-no-files-found: ignore
